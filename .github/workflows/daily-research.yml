name: AIグラス市場 日次調査

on:
  schedule:
    # 毎朝7:00 JST = 22:00 UTC (前日)
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write

jobs:
  daily-research:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      # YouTube Transcript MCP (オプション: 有効化する場合はコメント解除)
      # - name: Install YouTube MCP
      #   run: npm install -g youtube-transcript-mcp

      - name: Get today's date (JST)
        id: date
        run: echo "date=$(TZ=Asia/Tokyo date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Create reports directory
        run: mkdir -p reports/daily

      - name: Run daily research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "
          あなたはAIグラス市場シンクタンクのリサーチエージェントです。
          CLAUDE.mdとskills/daily-research/SKILL.mdの内容に従って、
          本日(${{ steps.date.outputs.date }})の日次調査レポートを作成してください。

          レポートは reports/daily/${{ steps.date.outputs.date }}.md に保存してください。

          重要:
          - Web検索で最新情報を収集すること
          - 全事実にソースURLを付記すること
          - 予算$5以下に収めること
          " \
          --model opus \
          --max-budget-usd 5 \
          --allowedTools "WebSearch,Read,Write,Edit,Bash"

      - name: Commit and push report
        run: |
          git config user.name "AI Glass Think Tank"
          git config user.email "glass-market-bot@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "📊 日次レポート: ${{ steps.date.outputs.date }}"
          git push

      # Google Drive へのアップロード (オプション: 有効化する場合はコメント解除)
      # サービスアカウントの認証情報が必要
      # - name: Upload to Google Drive
      #   env:
      #     GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
      #     GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      #   run: |
      #     pip install google-api-python-client google-auth
      #     python scripts/upload_to_gdrive.py reports/daily/${{ steps.date.outputs.date }}.md
